[config]
schemaVersion = "0.0.1"

[package]
namespace = "UltraFumosTeam"
name = "UltraFumos"
versionNumber = "1.4.0"
description = "Replaces skulls, rockets, soap and the torch with fumos"
websiteUrl = "https://github.com/RealKC/UltraFumos"
containsNsfwContent = false
[package.dependencies]
BepInEx-BepInExPack = "5.4.2100"
EternalsTeam-PluginConfigurator = "1.10.2"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./UltraFumos.dll"
target = "UltraFumos.dll"

[[build.copy]]
source = "./CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "./LICENSE.txt"
target = "LICENSE.txt"


[publish]
repository = "https://thunderstore.io"
communities = [ "ultrakill", ]
[publish.categories]
ultrakill = [ "mods", ]


